<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Surprise ❤️</title>

<style>

html, body {
    margin: 0;
    padding: 0;
    background: black;
    width: 100%;
    height: 100%;
    overflow: hidden;

    display: flex;
    align-items: center;
    justify-content: center;

    font-family: Arial, sans-serif;
}

.wrapper{
    position: relative;
}

video{
    max-width: 90vw;
    max-height: 90vh;

    width: auto;
    height: auto;

    object-fit: contain;

    border-radius: 18px;
    box-shadow: 0 25px 80px rgba(0,0,0,0.8);
}

.text{
    position:absolute;
    top:-60px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:28px;
    letter-spacing:1px;
    text-align:center;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="text">
You found the path ❤️
</div>

<video id="surpriseVideo" autoplay muted playsinline controls>

<source src="video.mp4" type="video/mp4">

</video>

</div>

<script>

const video = document.getElementById("surpriseVideo");

async function tryPlay(){
    try{
        await video.play();
    }
    catch(e){
        console.log("Autoplay blocked", e);
    }
}

tryPlay();

document.addEventListener("click", tryPlay, {once:true});
document.addEventListener("keydown", tryPlay, {once:true});
document.addEventListener("touchstart", tryPlay, {once:true});

</script>

</body>
</html>
